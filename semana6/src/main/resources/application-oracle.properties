# Perfil Oracle Autonomous (wallet). Define ORACLE_TNS_ADMIN = ruta absoluta a la carpeta Wallet.
# Ejemplo Windows: set ORACLE_TNS_ADMIN=C:\ruta\Wallet_miQuintaBD
spring.datasource.url=jdbc:oracle:thin:@miquintabd_high?TNS_ADMIN=${ORACLE_TNS_ADMIN}
spring.datasource.username=${ORACLE_USER:ADMIN}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
